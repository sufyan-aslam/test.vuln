  <!DOCTYPE html>                                                                                                                                                    
  <html>                                                                                                                                                           
  <body>                                                                                                                                                             
  <pre id="out">Loading...</pre>                                                                                                                                   
  <script>
  fetch('https://controlpanel.hyperwallet.com/graphql', {                                                                                                            
    method: 'POST',                                                                                                                                                  
    credentials: 'include',                                                                                                                                          
    headers: {                                                                                                                                                       
      'Content-Type': 'application/graphql',                                                                                                                       
      'Accept': 'application/json'                                                                                                                                   
    },
    body: '{ countries { nodes { code name } } }'                                                                                                                    
  })                                                                                                                                                               
  .then(r => r.json())                                                                                                                                               
  .then(data => {
    document.getElementById("out").innerText = JSON.stringify(data, null, 2);                                                                                        
  });                                                                                                                                                              
  </script>                                                                                                                                                          
  </body>
  </html>
